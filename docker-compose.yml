services:
  mongo:
    image: mongo:8.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=catan
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - REACT_APP_API_URL=
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongo_data:
